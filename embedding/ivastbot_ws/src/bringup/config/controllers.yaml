controller_manager:
  ros__parameters:
    update_rate: 100  # Hz — read()/write() cycle rate

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    drivetrain_controller:
      type: diff_drive_controller/DiffDriveController

drivetrain_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # Real hardware measurements (đo lại 14/5/2025)
    wheel_separation: 0.365     # (outer 40cm + inner 33cm) / 2 = 36.5cm
    wheel_radius: 0.060         # Bán kính bánh xe 6cm (đường kính 12cm)

    wheel_separation_multiplier: 1.0
    # Odom calibration: thực tế 0.6m nhưng odom báo 1.1m → factor = 0.6/1.1 = 0.545
    left_wheel_radius_multiplier: 0.545
    right_wheel_radius_multiplier: 0.545

    publish_rate: 100.0          # Odometry publish rate (Hz)
    odom_frame_id: odom
    base_frame_id: base_link

    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    open_loop: false            # Use encoder feedback
    position_feedback: false    # Use velocity feedback
    enable_odom_tf: true        # Publish odom -> base_footprint TF

    cmd_vel_timeout: 0.5        # Stop if no cmd_vel for 0.5s
    use_stamped_vel: false      # Accept Twist (not TwistStamped)

    # Velocity limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity: 15.0
    linear.x.min_velocity: -15.0
    linear.x.max_acceleration: 15.0
    linear.x.min_acceleration: -20.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity: 20.0
    angular.z.min_velocity: -20.0
    angular.z.max_acceleration: 15.0
    angular.z.min_acceleration: -20.0
